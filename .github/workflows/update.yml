name: RAPTOR BOND Update

on:
  schedule:
    - cron: '15 7 * * 1-5'
    - cron: '0 10 * * 1-5'
    - cron: '0 14 * * 1-5'
    - cron: '30 16 * * 1-5'
  workflow_dispatch:
    inputs:
      job:
        description: 'Job da eseguire'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - macro
          - bond
          - bond_acc

jobs:
  # ── MACRO CLASSIFIER ──────────────────────────────────────
  macro:
    name: Macro Classifier
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'macro' || github.event.inputs.job == 'both'))
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install yfinance requests --break-system-packages -q
      - name: Run Macro Classifier
        env:
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:       ${{ secrets.NOTIFY_EMAIL }}
          PAGES_URL:          https://giorgiogoldoni.github.io/bond/
        run: python scripts/update.py
      - name: Commit & push
        run: |
          git config user.name  "raptor-bot"
          git config user.email "raptor-bot@users.noreply.github.com"
          git add data/latest.json
          git diff --staged --quiet || git commit -m "🔮 Macro update — $(date -u +'%d/%m/%Y %H:%M') UTC"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && break
            echo "Retry $i/5..."
            sleep $((RANDOM % 8 + 3))
          done

  # ── PORTFOLIO BOND DISTRIBUZIONE ──────────────────────────
  bond:
    name: Portfolio Bond
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    needs: macro
    if: |
      always() && (
        github.event_name == 'schedule' ||
        (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'bond' || github.event.inputs.job == 'both'))
      )
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install yfinance numpy --break-system-packages -q
      - name: Run Portfolio Bond
        run: python update_portfolio_bond.py
      - name: Commit & push
        run: |
          git config user.name  "raptor-bot"
          git config user.email "raptor-bot@users.noreply.github.com"
          git add data/portfolio_bond.json nav_history_bond.json
          git diff --staged --quiet || git commit -m "🏦 Bond update — $(date -u +'%d/%m/%Y %H:%M') UTC"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && break
            echo "Retry $i/5..."
            sleep $((RANDOM % 8 + 3))
          done

  # ── PORTFOLIO BOND ACC ─────────────────────────────────────
  bond_acc:
    name: Portfolio Bond ACC
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    needs: macro
    if: |
      always() && (
        github.event_name == 'schedule' ||
        (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'bond_acc' || github.event.inputs.job == 'both'))
      )
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install yfinance numpy --break-system-packages -q
      - name: Run Portfolio Bond ACC
        run: python update_portfolio_bond_acc.py
      - name: Commit & push
        run: |
          git config user.name  "raptor-bot"
          git config user.email "raptor-bot@users.noreply.github.com"
          git add data/portfolio_bond_acc.json nav_history_bond_acc.json
          git diff --staged --quiet || git commit -m "💎 Bond ACC update — $(date -u +'%d/%m/%Y %H:%M') UTC"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && break
            echo "Retry $i/5..."
            sleep $((RANDOM % 8 + 3))
          done

